version: "3.9"

# ── All AI runs locally — no paid API keys required ───────────────────────────
#
# Services:
#   ollama   — local LLM server (Llama 3.2 / Mistral / etc.)
#   backend  — FastAPI + Whisper + ChromaDB
#   frontend — Streamlit UI
#
# First-time setup:
#   docker compose up ollama -d
#   docker compose exec ollama ollama pull llama3.2
#   docker compose up --build
#
# GPU acceleration (NVIDIA):
#   Uncomment the `deploy` block under the ollama service.

services:

  # ── Ollama (local LLM server) ───────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama   # persist downloaded model weights
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    # ── Uncomment for NVIDIA GPU acceleration ──────────────────────────────
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - EMBED_MODEL=${EMBED_MODEL:-all-MiniLM-L6-v2}
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Streamlit frontend ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    environment:
      - API_BASE=http://backend:8000/api/v1/sessions
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ollama_models:   # named volume so model weights survive container restarts
